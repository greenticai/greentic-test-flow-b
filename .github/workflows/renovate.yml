name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch CodeArtifact token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain corp-artifacts \
            --domain-owner 599558443099 \
            --region eu-north-1 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.10
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug
          RENOVATE_ALLOW_CUSTOM_CRATE_REGISTRIES: true
          CARGO_REGISTRIES_CORP_ARTIFACTS_GREENTIC_TEST_TOKEN: ${{ steps.codeartifact.outputs.token }}
          RENOVATE_HOST_RULES: >-
            [{"matchHost":"corp-artifacts-599558443099.d.codeartifact.eu-north-1.amazonaws.com","hostType":"crate","token":"${{ steps.codeartifact.outputs.token }}"}]