name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve base branches (exclude main)
        id: branches
        shell: bash
        run: |
          set -euo pipefail
          branches="$(git ls-remote --heads "https://github.com/${GITHUB_REPOSITORY}.git" \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -v '^main$' \
            | paste -sd, -)"
          echo "renovate_base_branches=${branches}" >> "$GITHUB_OUTPUT"
          echo "Using base branches: ${branches}"

      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.10
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_BASE_BRANCHES: ${{ steps.branches.outputs.renovate_base_branches }}
          LOG_LEVEL: debug
