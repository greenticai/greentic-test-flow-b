name: Sync test-types from CodeArtifact

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve latest dev version from CodeArtifact
        id: resolve
        run: |
          LATEST=$(aws codeartifact list-package-versions \
            --domain corp-artifacts \
            --domain-owner 599558443099 \
            --repository greentic \
            --format cargo \
            --package test-types \
            --sort-by PUBLISHED_TIME \
            --max-results 50 \
            --query "versions[?contains(version, '-dev.')].version | [0]" \
            --output text)
          if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
            echo "No dev version found" >&2
            exit 1
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest dev version: $LATEST"

      - name: Update Cargo.toml
        env:
          LATEST: ${{ steps.resolve.outputs.latest }}
        run: |
          python - << 'PY'
          import os, re
          from pathlib import Path
          latest = os.environ['LATEST']
          p = Path('Cargo.toml')
          s = p.read_text(encoding='utf-8')
          s2 = re.sub(
              r'test-types\s*=\s*\{\s*version\s*=\s*"[^"]+"\s*,\s*registry\s*=\s*"corp-artifacts-greentic-test"\s*\}',
              f'test-types = {{ version = "={latest}", registry = "corp-artifacts-greentic-test" }}',
              s,
          )
          if s != s2:
              p.write_text(s2, encoding='utf-8')
              print('updated')
          else:
              print('nochange')
          PY

      - name: Create PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): bump test-types to ${{ steps.resolve.outputs.latest }}"
          branch: "bot/test-types-${{ steps.resolve.outputs.latest }}"
          title: "chore(deps): bump test-types to ${{ steps.resolve.outputs.latest }}"
          body: "Automated update from CodeArtifact latest dev version."
          delete-branch: true

      - name: Merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch --repo ${{ github.repository }}